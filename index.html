<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="/src/styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tauri App</title>
        <script type="module" src="/src/main.ts" defer></script>
    </head>

    <body>
        <main class="container">
            <h1>Speaking Coach</h1>

            <div>
                <input
                    id="api-key-input"
                    type="password"
                    placeholder="LLM API key"
                />
                <input
                    id="base-url-input"
                    placeholder="Base URL ex: 'https://openrouter.ai/api/v1'"
                />
                <input
                    id="model-input"
                    placeholder="Model ex: 'openai/gpt-4o-mini'"
                />
                <button id="save-key-btn" type="button">Save key</button>
                <span id="key-status"></span>

                <button id="test-llm-btn" type="button">Test connection</button>
            </div>

            <button id="transcribe-btn" type="button">Transcribe sample</button>
            <p id="transcript"></p>
            <button id="record-btn" type="button">
                Record 5s &amp; transcribe
            </button>

            <button id="llm-btn" type="button">Get Coaching</button>
            <p id="llm-response"></p>

            <button id="metrics-btn" type="button">Speech metrics</button>
            <div id="metrics"></div>
        </main>
    </body>
</html>
